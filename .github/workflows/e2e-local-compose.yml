name: E2E Local Compose

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare .env for CI compose
        shell: bash
        run: |
          cp .env.example .env
          {
            echo "RUN_DB_MIGRATIONS=1"
            echo "RUN_DB_SEED=1"
            echo "ZIPPY_ADMIN_EMAIL=admin@zippy.local"
            echo "ZIPPY_ADMIN_PASSWORD=ChangeMe_12345!"
            echo "ZIPPY_ADMIN_RESET_PASSWORD=1"
          } >> .env

      - name: Start local compose
        run: docker compose -f infra/docker-compose.local.yml up -d --build

      - name: Wait for gateway health
        shell: bash
        run: |
          for i in {1..90}; do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" http://localhost:3000/health || true)
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "Gateway health timeout"
          docker compose -f infra/docker-compose.local.yml logs --no-color api-gateway auth ride driver payment || true
          exit 1

      - name: Run e2e tests
        run: pnpm test:e2e

      - name: Compose logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.local.yml logs --no-color api-gateway auth ride driver payment || true

      - name: Tear down compose
        if: always()
        run: docker compose -f infra/docker-compose.local.yml down -v
